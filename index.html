<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Game Club</title>
    <style>
        canvas { border: 1px solid black; }
        #controls { margin-top: 10px; }
    </style>
<script src="jsnes.min.js"></script>
</head>
<body>
    <h1>Добро пожаловать в Game Club!</h1>
    <p>Нажмите на кнопку ниже, чтобы загрузить и запустить игру.</p>

    <canvas id="screen" width="256" height="240"></canvas>
    <div id="controls">
        <button onclick="loadGame()">Запустить игру</button>
    </div>

    <script>
        const romUrl = 'SidePocket.nes'; // Убедитесь, что имя совпадает с файлом в репозитории

        const nes = new jsnes.NES({
            onFrame: function(frameBuffer) {
                const canvas = document.getElementById('screen');
                const ctx = canvas.getContext('2d');
                const imageData = ctx.getImageData(0, 0, 256, 240);
                for (let i = 0; i < frameBuffer.length; i++) {
                    imageData.data[i * 4 + 0] = frameBuffer[i] & 0xff;
                    imageData.data[i * 4 + 1] = (frameBuffer[i] >> 8) & 0xff;
                    imageData.data[i * 4 + 2] = (frameBuffer[i] >> 16) & 0xff;
                    imageData.data[i * 4 + 3] = 0xff;
                }
                ctx.putImageData(imageData, 0, 0);
            },
            onAudioSample: function(left, right) {
                // Здесь можно настроить аудио, если потребуется
            }
        });

        function loadGame() {
            fetch(romUrl)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Ошибка загрузки ROM: ' + response.statusText);
                    }
                    return response.arrayBuffer();
                })
                .then(buffer => {
                    nes.loadROM(new Uint8Array(buffer));
                    nes.start();
                })
                .catch(error => {
                    console.error('Ошибка:', error);
                    alert('Не удалось загрузить игру. Проверьте путь к файлу ROM.');
                });
        }
    </script>
</body>
</html>
