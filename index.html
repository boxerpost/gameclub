<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Club</title>
</head>
<body>
    <h1>Добро пожаловать в Game Club!</h1>
    <p>Нажмите на кнопку ниже, чтобы загрузить и запустить игру:</p>
    <button id="startButton">Запустить игру</button>
    <div id="gameContainer"></div>

    <script src="data/emulator.min.js"></script>
    <script>
        document.getElementById("startButton").addEventListener("click", function () {
            // Проверяем наличие объекта Emulator
            if (typeof Emulator === "undefined") {
                alert("Ошибка загрузки эмулятора. Проверьте путь к файлу.");
                return;
            }
            // Инициализация эмулятора
            const gameContainer = document.getElementById("gameContainer");
            const emulator = new Emulator(gameContainer, {
                gameUrl: "SidePocket.nes", // Убедитесь, что путь к игре правильный
                coreUrl: "data/cores/nestopia.js", // Убедитесь, что путь к ядру эмулятора правильный
                autostart: true
            });
            emulator.start();
        });
    </script>
</body>
</html>
