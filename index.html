<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Game Club</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f4f4f4;
        }
        canvas {
            border: 1px solid black;
        }
        #controls {
            margin-top: 10px;
        }
    </style>
    <!-- Подключение EmulatorJS через CDN -->
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</head>
<body>
    <h1>Добро пожаловать в Game Club!</h1>
    <p>Нажмите на кнопку ниже, чтобы загрузить и запустить игру.</p>

    <!-- Контейнер для игры -->
    <div style="width:100%;height:100%;max-width:512px;">
        <div id="game"></div>
    </div>

    <!-- Кнопка для запуска игры -->
    <div id="controls">
        <button onclick="loadGame()">Запустить игру</button>
    </div>

    <script>
        // Функция для загрузки и запуска игры
        function loadGame() {
            // Параметры для настройки эмулятора
            EJS_player = "#game";
            EJS_core = "nes"; // Ядро для NES игр
            EJS_gameUrl = "SidePocket.nes"; // Убедитесь, что файл игры SidePocket.nes доступен
            EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
            EJS_color = "#0064ff";
            EJS_startOnLoaded = true;

            // Проверка, что эмулятор успешно загрузился и готов к запуску
            if (typeof EJS_emulator !== 'undefined' && EJS_emulator.start) {
                EJS_emulator.start();
            } else {
                alert('Ошибка загрузки эмулятора. Проверьте, что подключены все необходимые файлы.');
            }
        }
    </script>
</body>
</html>
