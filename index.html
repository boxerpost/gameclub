<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Game Club</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f4f4f4;
        }
        canvas {
            border: 1px solid black;
        }
        #controls {
            margin-top: 10px;
        }
    </style>
    <!-- Изменение пути к loader.js -->
    <script src="data/loader.js" defer></script>
</head>
<body>
    <h1>Добро пожаловать в Game Club!</h1>
    <p>Нажмите на кнопку ниже, чтобы загрузить и запустить игру.</p>

    <div style="width:100%;height:100%;max-width:512px;">
        <div id="game"></div>
    </div>

    <div id="controls">
        <button onclick="loadGame()">Запустить игру</button>
    </div>

    <script>
        function loadGame() {
            // Подождем пока загрузится скрипт
            if (typeof EmulatorJS === 'undefined') {
                alert('Ошибка загрузки эмулятора. Пожалуйста, убедитесь, что loader.js загружен корректно.');
                return;
            }

            try {
                // Настройка переменных
                EJS_player = "#game";
                EJS_core = "nes";
                EJS_gameUrl = "SidePocket.nes";
                EJS_pathtodata = "data/";
                EJS_color = "#0064ff";
                EJS_startOnLoaded = true;

                // Создание экземпляра эмулятора
                let emulator = new EmulatorJS(EJS_player, {
                    path: EJS_pathtodata,
                    gameUrl: EJS_gameUrl,
                    core: EJS_core,
                    startOnLoaded: EJS_startOnLoaded,
                    color: EJS_color
                });

                emulator.start();
            } catch (error) {
                console.error('Произошла ошибка при запуске эмулятора:', error);
                alert('Ошибка при запуске эмулятора. Проверьте консоль для подробностей.');
            }
        }
    </script>
</body>
</html>
